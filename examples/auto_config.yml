# UDef-ARP automatic workflow configuration.
#
# Put the required input rasters in working_directory using the exact filenames
# listed below. The runner discovers them automatically and generates all
# intermediate/output rasters from the selected stages.

working_directory: C:/path/to/your/udef_project
output_prefix: acre
output_extension: tif

# Required for the VP stage.
expected_deforestation: 10000

# Default workflow when "stages" is omitted:
# 1. nrt
# 2. vulnerability_distance for HRP
# 3. fit
# 4. vulnerability_distance for VP
# 5. cnf
# 6. vp

# Optional: override any default input filename here.
# inputs:
#   admin_divisions: admin_divisions.tif
#   jurisdiction_mask: jurisdiction_mask.tif
#   forest_mask_cal: forest_mask_cal.tif
#   distance_to_non_forest_cal: distance_to_non_forest_cal.tif
#   distance_to_non_forest_hrp: distance_to_non_forest_hrp.tif
#   distance_to_non_forest_vp: distance_to_non_forest_vp.tif
#   deforestation_cal: deforestation_cal.tif
#   deforestation_hrp: deforestation_hrp.tif
#   deforestation_cnf: deforestation_cnf.tif

# Optional: compare one or more empirical vulnerability maps.
# Put at least one file matching empirical_vulnerability_*.tif in
# working_directory, or list maps explicitly here.
# empirical_vulnerability_maps:
#   - path: empirical_vulnerability_model_a.tif
#     label: model_a
#   - path: empirical_vulnerability_model_b.tif
#     label: model_b

# Optional: uncomment to run a custom subset/order.
# stages:
#   - name: nrt
#   - name: vulnerability_distance
#     period: hrp
#   - name: fit
#   - name: vulnerability_distance
#     period: vp
#   - name: cnf
#   - name: vp

# Optional: alternative empirical vulnerability map.
# stages:
#   - name: nrt
#   - name: vulnerability_distance
#     period: vp
#   - name: empirical_vulnerability_comparison
#     comparison_csv: acre_empirical_vulnerability_comparison.csv
#     run_fit: true
#     run_cnf: true
#     run_vp: true

