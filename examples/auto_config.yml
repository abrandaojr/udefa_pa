# UDef-ARP automatic workflow configuration.
#
# Paths can be absolute or relative to working_directory.
# Remove stages you do not want to run.

working_directory: C:/path/to/your/udef_project
output_prefix: acre
output_extension: tif

stages:
  - name: nrt
    distance: distance_to_non_forest_cal.tif
    deforestation_hrp: deforestation_hrp.tif
    mask: jurisdiction_mask.tif
    output_txt: acre_nrt.txt

  - name: vulnerability_distance
    distance: distance_to_non_forest_hrp.tif
    mask: jurisdiction_mask.tif
    # Uses the NRT calculated by the previous stage.
    output: acre_vulnerability_hrp.tif

  - name: fit
    risk30_hrp: acre_vulnerability_hrp.tif
    municipality: admin_divisions.tif
    deforestation_hrp: deforestation_hrp.tif
    relative_frequency_csv: acre_relative_frequency_hrp.csv
    modeling_region_output: acre_modeling_region_hrp.tif
    density_output: acre_density_hrp.tif

  - name: vulnerability_distance
    distance: distance_to_non_forest_vp.tif
    mask: jurisdiction_mask.tif
    # Uses the NRT calculated by the first stage.
    output: acre_vulnerability_vp.tif

  - name: cnf
    # Uses the relative-frequency CSV generated by the fit stage.
    municipality: admin_divisions.tif
    deforestation_cnf: deforestation_cnf.tif
    risk30_vp: acre_vulnerability_vp.tif
    max_iterations: 25
    modeling_region_output: acre_modeling_region_cnf.tif
    density_output: acre_density_cnf.tif

  - name: vp
    # Uses the relative-frequency CSV generated by the fit stage.
    municipality: admin_divisions.tif
    risk30_vp: acre_vulnerability_vp.tif
    expected_deforestation: 10000
    max_iterations: 25
    modeling_region_output: acre_modeling_region_vp.tif
    density_output: acre_density_vp.tif

  # Optional: alternative empirical vulnerability map.
  # - name: vulnerability_alternative
  #   empirical: empirical_vulnerability_0_1.tif
  #   mask: jurisdiction_mask.tif
  #   forest_mask: forest_mask.tif
