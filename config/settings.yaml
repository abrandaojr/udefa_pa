project:
  name: udefa_pa
  description: UDefA Para pipeline for MapBiomas persistence scenarios, CTrees reference
    products, raster synchronization, local metrics, and publication outputs.
earth_engine:
  project: ee-abrandaojr
  output_crs: EPSG:5880
  aoi:
    states_feature_collection: users/abrandaojr/BR_geometries/BR_States_2015
    state_property: CD_GEOCUF
    state_code: '15'
    state_name: Para
  mapbiomas_image: projects/mapbiomas-public/assets/brazil/lulc/collection10_1/mapbiomas_brazil_collection10_1_coverage_v1
  scale_native_m: 30
  max_pixels: 10000000000000
grid:
  crs: EPSG:5880
  scale_m: 30
  anchor_asset: projects/ee-abrandaojr/assets/Brazil_Para_FCBM1_YEAR_2009
  boundary_asset: projects/ee-abrandaojr/assets/Brazil_Para_DMJSS
  include_10km_buffer: true
  resampling_method: nearestNeighbor
  max_pixels: 10000000000000
analysis:
  years:
    start: 1985
    end: 2024
  spatial_units:
    provider: IBGE municipalities
    asset: users/abrandaojr/BR_geometries/BR_Municipalities_2015
    id_property: CD_GEOCMU
    name_property: NM_MUNICIP
  forest_codes:
  - 1
  - 3
  - 4
  excluded_mapbiomas_codes:
  - 5
  - 6
  - 9
  - 11
  - 14
  - 18
  - 19
  - 20
  - 21
  - 24
  - 26
  - 27
  - 30
  - 31
  - 33
  - 35
  - 36
  - 37
  - 38
  - 39
  - 40
  - 41
  - 46
  - 47
  - 48
  - 62
  scenarios:
  - id: A
    threshold_percent: 100
    start_year: 1985
    end_year: 2024
  - id: B
    threshold_percent: 95
    start_year: 1985
    end_year: 2024
  - id: C
    threshold_percent: 50
    start_year: 1985
    end_year: 2024
  - id: D
    threshold_percent: 100
    start_year: 2015
    end_year: 2024
  - id: E
    threshold_percent: 100
    start_year: 2013
    end_year: 2024
  - id: F
    threshold_percent: 100
    start_year: 2018
    end_year: 2024
references:
  FCBM4:
    asset: projects/ee-abrandaojr/assets/para_ctres_fcbm_4class
    label: FCBM4
    class_codes:
    - 0
    - 1
    - 2
    - 3
    - 4
    class_labels:
      0: No Data
      1: Stable Non-Forest
      2: Stable Forest
      3: Deforested in first half of HRP
      4: Deforested in second half of HRP
    groups:
      forest:
      - Stable Forest
      nonforest:
      - Stable Non-Forest
      change:
      - Deforested in first half of HRP
      - Deforested in second half of HRP
      excluded:
      - No Data
