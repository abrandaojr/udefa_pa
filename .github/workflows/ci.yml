name: CI

on:
  push:
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lightweight automation dependency
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Compile Python files
        run: |
          python -m compileall -q UDef-ARP.py udef_auto.py allocation_tool.py vulnerability_map.py model_evaluation.py

      - name: Check automation help
        run: |
          python udef_auto.py --help
